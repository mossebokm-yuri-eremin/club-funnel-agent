<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <!-- Брендинг MOSSEBO. Cover (титульный слайд). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C2826"/>
      <stop offset="100%" stop-color="#1a1714"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7518"/>
      <stop offset="100%" stop-color="#ff9a4c"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Декоративная оранжевая полоска сверху -->
  <rect x="80" y="120" width="80" height="8" fill="url(#accent)" rx="4"/>

  <!-- Малый kicker сверху (рубрика) -->
  <text x="180" y="142"
        font-family="Inter, -apple-system, 'SF Pro Display', sans-serif"
        font-weight="600" font-size="22"
        fill="#dfdbd8" letter-spacing="3">{{KICKER}}</text>

  <!-- Главный заголовок (foreignObject — даёт word-wrap для длинных строк) -->
  <foreignObject x="80" y="340" width="920" height="700">
    <div xmlns="http://www.w3.org/1999/xhtml"
         style="
           font-family: Inter, -apple-system, 'SF Pro Display', sans-serif;
           font-weight: 800;
           font-size: 84px;
           line-height: 1.05;
           letter-spacing: -0.02em;
           color: #ffffff;
           word-wrap: break-word;
           white-space: pre-wrap;
         ">{{TEXT}}</div>
  </foreignObject>

  <!-- Подпись внизу: автор + хендл -->
  <text x="80" y="1240"
        font-family="Inter, -apple-system, 'SF Pro Display', sans-serif"
        font-weight="700" font-size="34" fill="#ff7518">Юрий Еремин</text>
  <text x="80" y="1280"
        font-family="Inter, -apple-system, sans-serif"
        font-weight="500" font-size="22" fill="#dfdbd8" opacity="0.7">@yury_eremin · клуб «Реализация»</text>
</svg>
