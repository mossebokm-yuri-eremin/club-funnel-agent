# nginx config для agent.yury-eremin.ru
# Размещение: /etc/nginx/sites-available/agent.yury-eremin.ru
# Затем: ln -sf /etc/nginx/sites-available/agent.yury-eremin.ru /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx
#
# Reverse proxy на club-funnel-agent (127.0.0.1:3000) + alias /cdn/ для local
# fallback Cloudinary. Certbot --nginx после применит TLS-блок автоматически.

server {
    listen 80;
    listen [::]:80;
    server_name agent.yury-eremin.ru;

    # Лимит на тело запроса (Telegram файлы голосовых до 20 MB; rawBody парсер на 2 MB).
    client_max_body_size 25M;

    # Healthcheck (без auth) — nginx не проксирует на app, отвечает локально для liveness.
    location = /health-nginx {
        access_log off;
        return 200 "ok\n";
    }

    # CDN для каруселей (SPEC AC-21 local fallback).
    location /cdn/ {
        alias /var/www/cdn/;
        add_header Cache-Control "public, max-age=2592000, immutable";
        autoindex off;
        try_files $uri =404;
    }

    # Все остальные запросы — на app (Fastify слушает 127.0.0.1:3000).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
